<style>
  #gate {
    position: fixed; inset: 0; z-index: 9999;
    background: #14251D;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 2rem;
    font-family: 'Inter Tight', sans-serif;
  }
  #gate svg { width: 72px; height: 72px; color: #C07D6E; }
  #gate .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(196,165,130,0.55);
  }
  #gate .title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem; font-weight: 500; color: #E7DEC9;
    margin: 0; letter-spacing: -0.015em;
  }
  #gate .title em { font-style: italic; color: #C07D6E; }
  #gate form { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
  #gate input {
    background: transparent; border: 1px solid rgba(231,222,201,0.18);
    color: #E7DEC9; padding: 0.7rem 1.4rem; font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem; letter-spacing: 0.12em; text-align: center;
    outline: none; width: 220px;
    transition: border-color 0.2s;
  }
  #gate input:focus { border-color: rgba(192,125,110,0.6); }
  #gate button {
    background: #8F3A2E; color: #F6F1E8; border: none;
    padding: 0.65rem 2.5rem; font-family: 'Inter Tight', sans-serif;
    font-size: 0.78rem; font-weight: 500; letter-spacing: 0.08em;
    cursor: pointer; transition: background 0.2s;
  }
  #gate button:hover { background: #A8594B; }
  #gate .error {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: #A8594B; min-height: 1em;
  }
  #gate .hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(196,165,130,0.3); margin-top: 1rem;
  }
</style>
<script>
  (function() {
    if (sessionStorage.getItem('tt-auth') === '1') return;
    document.addEventListener('DOMContentLoaded', function() {
      var gate = document.getElementById('gate');
      if (gate) gate.style.display = 'flex';
      document.getElementById('app').style.visibility = 'hidden';
    });
  })();
</script>
</head>
<body>
  <div id="app"></div>
  <div id="mermaid-rendering-container"></div>

  <div id="gate" style="display:none">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="100" cy="100" r="88"/>
      <path d="M100 28 C 66 60, 66 110, 100 142 C 134 110, 134 60, 100 28 Z"/>
      <path d="M100 28 C 66 60, 66 110, 100 142 C 134 110, 134 60, 100 28 Z" transform="rotate(120 100 100)"/>
      <path d="M100 28 C 66 60, 66 110, 100 142 C 134 110, 134 60, 100 28 Z" transform="rotate(240 100 100)"/>
      <circle cx="100" cy="100" r="5.5" fill="currentColor" stroke="none"/>
    </svg>
    <div class="label">Acesso restrito</div>
    <p class="title">Tribo<em>Tax</em></p>
    <form id="gate-form">
      <input type="password" id="gate-input" placeholder="senha de acesso" autocomplete="current-password">
      <div class="error" id="gate-error"></div>
      <button type="submit">Acessar</button>
    </form>
    <div class="hint">Documento interno · circulação restrita</div>
  </div>

  <script>
    document.getElementById('gate-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var val = document.getElementById('gate-input').value;
      if (val === 'tribotax2026') {
        sessionStorage.setItem('tt-auth', '1');
        document.getElementById('gate').style.display = 'none';
        document.getElementById('app').style.visibility = 'visible';
      } else {
        document.getElementById('gate-error').textContent = 'senha incorreta';
        document.getElementById('gate-input').value = '';
        document.getElementById('gate-input').focus();
      }
    });
    if (sessionStorage.getItem('tt-auth') === '1') {
      document.getElementById('gate').style.display = 'none';
    }
  </script>
</body>
